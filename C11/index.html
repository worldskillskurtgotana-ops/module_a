<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Image Mosaic Generator</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #111;
            color: white;
        }
        canvas {
            margin-top: 20px;
            image-rendering: pixelated; /* make cells sharp */
        }
        input, button {
            margin-top: 10px;
            padding: 8px;
            font-size: 16px;
        }
    </style>
</head>
<body>

<h2>Dynamic Image Mosaic</h2>

<input type="file" id="imageInput" accept="image/*">
<canvas id="mosaicCanvas"></canvas>

<script src="script.js"></script>
</body>
</html>
