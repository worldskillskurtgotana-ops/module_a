<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hover Bar Chart</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.chart{
    width:500px;
    height:300px;
    border:2px solid #333;
    display:flex;
    align-items:flex-end;
    justify-content:space-around;
    padding:20px;
    background:white;
}

.bar{
    width:50px;
    transform:scaleY(0);
    transform-origin:bottom;
    transition:transform 0.6s ease;
}

.bar1{ height:120px; background:#ff6b6b; transition-delay:0.1s;}
.bar2{ height:180px; background:#4ecdc4; transition-delay:0.3s;}
.bar3{ height:90px;  background:#1a73e8; transition-delay:0.5s;}
.bar4{ height:220px; background:#ffa502; transition-delay:0.7s;}
.bar5{ height:150px; background:#6c5ce7; transition-delay:0.9s;}

.chart:hover .bar{
    transform:scaleY(1);
}
</style>

</head>
<body>

<div class="chart">
    <div class="bar bar1"></div>
    <div class="bar bar2"></div>
    <div class="bar bar3"></div>
    <div class="bar bar4"></div>
    <div class="bar bar5"></div>
</div>

</body>
</html>
